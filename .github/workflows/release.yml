name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: a tag must clear the full pre-tag checklist before anything is
  # published. A fresh install verifies the helper-script SHA pins over the
  # network, so a tag with stale pins would yield a broken install straight
  # from the release. This job blocks that.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the merge-base for the diff checks is present.
          fetch-depth: 0

      - name: Fetch main for diff base
        # The tag checkout does not bring branch refs. preflight-check.sh diffs
        # against origin/main, so make that ref resolvable. A hard failure here
        # is intentional: without a base ref the punctuation/marker diff checks
        # cannot run.
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Install shellcheck and bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Run preflight checks
        env:
          BASE_REF: origin/main
        run: bash scripts/preflight-check.sh

  release:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists - skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bilingual release notes and title
        if: steps.check.outputs.exists != 'true'
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          # build-release-notes.sh assembles the RU+EN body and a descriptive
          # title from both changelogs. It exits non-zero if the version section
          # is missing in either CHANGELOG.md or CHANGELOG.en.md, which fails the
          # job before any release is created.
          bash scripts/build-release-notes.sh "$VERSION" > /tmp/release-notes.md
          TITLE="$(bash scripts/build-release-notes.sh --title "$VERSION")"
          {
            echo "title<<__RELEASE_TITLE__"
            echo "$TITLE"
            echo "__RELEASE_TITLE__"
          } >> "$GITHUB_OUTPUT"

          echo "--- Release title ---"
          echo "$TITLE"
          echo "--- Release notes preview ---"
          cat /tmp/release-notes.md

      - name: Create Release
        if: steps.check.outputs.exists != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: ${{ steps.changelog.outputs.title }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
